<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Scanner">
<meta name="theme-color" content="#0a0a0f">
<title>Bar Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --muted: rgba(240,237,232,0.45); --hint: rgba(240,237,232,0.25);
    --amber: #e8a94a; --amber-dim: rgba(232,169,74,0.15); --amber-border: rgba(232,169,74,0.3);
    --green: #4ecb8d; --green-dim: rgba(78,203,141,0.12);
    --red: #e8604a; --red-dim: rgba(232,96,74,0.12);
    --blue: #6ab4f5; --blue-dim: rgba(106,180,245,0.12);
    --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }

  .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: env(safe-area-inset-top, 44px) 20px 14px; background: linear-gradient(to bottom, var(--bg) 70%, transparent); display: flex; align-items: flex-end; justify-content: space-between; }
  .header h1 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; letter-spacing: -0.02em; }
  .header h1 span { color: var(--amber); font-style: italic; }
  .header-badge { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 20px; }

  .scroll-area { min-height: 100%; padding-top: calc(env(safe-area-inset-top, 44px) + 72px); padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 100px); padding-left: 16px; padding-right: 16px; }

  .config-section { margin-bottom: 20px; }
  .config-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--muted); letter-spacing: 0.05em; width: 100%; justify-content: space-between; }
  .config-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
  .config-toggle.open svg { transform: rotate(180deg); }
  .config-body { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); padding: 14px; display: none; }
  .config-body.open { display: block; }
  .config-body label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 6px; margin-top: 12px; }
  .config-body label:first-child { margin-top: 0; }
  .config-body input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 12px; outline: none; }
  .config-body input:focus { border-color: var(--amber); }
  .config-body .note { font-size: 11px; color: var(--hint); margin-top: 8px; line-height: 1.6; }
  .save-config { margin-top: 12px; width: 100%; padding: 10px; background: var(--amber-dim); border: 1px solid var(--amber-border); border-radius: 8px; color: var(--amber); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; cursor: pointer; }

  .scan-zone { background: var(--surface); border: 1px dashed var(--border2); border-radius: var(--radius); overflow: hidden; min-height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin-bottom: 12px; cursor: pointer; }
  .scan-zone img { width: 100%; max-height: 320px; object-fit: contain; display: none; }
  .scan-placeholder { text-align: center; padding: 32px 20px; }
  .scan-placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .scan-placeholder p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .scan-placeholder small { font-size: 11px; color: var(--hint); margin-top: 6px; display: block; }

  .scan-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .scan-btns button { padding: 16px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .scan-btns button:active { background: var(--surface2); }
  .scan-btns button .btn-icon { font-size: 24px; }
  .scan-btns button.primary { background: var(--amber-dim); border-color: var(--amber-border); color: var(--amber); }
  .clear-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; margin-bottom: 20px; display: none; }

  .status { font-size: 13px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 16px; display: none; line-height: 1.5; }
  .status.visible { display: flex; align-items: center; gap: 10px; }
  .status.info { background: var(--blue-dim); border: 1px solid rgba(106,180,245,0.2); color: var(--blue); }
  .status.success { background: var(--green-dim); border: 1px solid rgba(78,203,141,0.2); color: var(--green); }
  .status.error { background: var(--red-dim); border: 1px solid rgba(232,96,74,0.2); color: var(--red); }
  .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; display: none; }
  .result-card.visible { display: block; }
  .result-row { margin-bottom: 14px; }
  .result-row:last-child { margin-bottom: 0; }
  .result-label { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .result-val { font-size: 15px; color: var(--text); line-height: 1.4; }
  .result-val.small { font-size: 13px; color: var(--muted); }
  .type-pill { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 20px; }
  .type-spirit { background: rgba(78,203,141,0.15); color: var(--green); border: 1px solid rgba(78,203,141,0.25); }
  .type-mixer { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
  .type-other { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(106,180,245,0.25); }

  .edit-section { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .edit-section.visible { display: block; }
  .edit-section label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 5px; margin-top: 12px; }
  .edit-section label:first-child { margin-top: 0; }
  .edit-section input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 12px; outline: none; }
  .edit-section input:focus { border-color: var(--amber); }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .action-row button { padding: 14px 12px; border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text); }
  .action-row button:active { background: var(--surface2); }
  .action-row .add-btn { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 500; }
  .action-row .add-btn:active { background: #d4953d; }
  .action-row .add-btn:disabled { background: var(--surface2); border-color: var(--border); color: var(--hint); cursor: default; }

  .inventory { margin-top: 8px; }
  .inventory-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .inventory-header h2 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; }
  .inventory-header .count { font-size: 11px; color: var(--muted); }
  .inv-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
  .inv-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .inv-item-brand { font-size: 14px; font-weight: 500; }
  .inv-item-full { font-size: 12px; color: var(--muted); margin-top: 3px; }
</style>
</head>

    <img id="preview" alt="Bottle preview" />
